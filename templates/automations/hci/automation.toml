version = 1
id = "hci"
kind = "cron"
name = "总结 HCI"
prompt = "帮我总结一下过去一周 HCI 领域的热门论文。\n\n你可以使用 HCI Index 的聚合结果：https://hciindex.com/\n\n请同时将内容写入 Obsidian 的 Digest 文件夹，路径为：\n__DIGEST_PATH__\n\n文件命名格式为：\nW[周序号]-HCI.md\n例如：W04-HCI.md\n\n不要只告诉我文件已写入；即使已经写入 Obsidian，也请在对话里完整展示总结内容。\n展示内容不要按 Markdown 代码块的形式，正常输出即可。"
status = "ACTIVE"
rrule = "RRULE:FREQ=WEEKLY;BYHOUR=12;BYMINUTE=30;BYDAY=MO"
model = "gpt-5.5"
reasoning_effort = "medium"
execution_environment = "local"
cwds = ["__WORKSPACE_DIR__"]
